name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            rust_target: aarch64-apple-darwin
            artifact_name: darwin-aarch64
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            rust_target: x86_64-apple-darwin
            artifact_name: darwin-x86_64
          - platform: ubuntu-22.04
            args: ''
            rust_target: ''
            artifact_name: linux-x86_64
          - platform: windows-latest
            args: ''
            rust_target: ''
            artifact_name: windows-x86_64

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install

      - name: Setup Apple code signing
        if: startsWith(matrix.platform, 'macos')
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          CERT_PATH=$RUNNER_TEMP/certificate.p12

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "actions" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "actions" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "actions" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain

      - name: Setup Apple notarization
        if: startsWith(matrix.platform, 'macos')
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "$APPLE_ID" ] || [ -z "$APPLE_PASSWORD" ]; then
            echo "Missing Apple notarization secrets. Configure APPLE_ID and APPLE_PASSWORD." >&2
            exit 1
          fi

      - name: Build Tauri
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx tauri build ${{ matrix.args }}

      - name: Validate notarized macOS app bundles
        if: startsWith(matrix.platform, 'macos')
        shell: bash
        run: |
          apps_found=0

          while IFS= read -r app; do
            [ -n "$app" ] || continue
            apps_found=$((apps_found + 1))

            echo "Validating $app"
            codesign -dv --verbose=4 "$app"
            spctl -a -vv "$app"
            xcrun stapler validate "$app"
          done < <(find src-tauri/target -path "*/release/bundle/macos/*.app" -type d)

          if [ "$apps_found" -eq 0 ]; then
            echo "No macOS app bundle found to validate." >&2
            exit 1
          fi

      - name: Notarize and staple macOS DMGs
        if: startsWith(matrix.platform, 'macos')
        shell: bash
        run: |
          dmgs_found=0
          notary_args=(--apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" --wait)

          if [ "${#APPLE_TEAM_ID}" -ge 3 ]; then
            notary_args+=(--team-id "$APPLE_TEAM_ID")
          fi

          while IFS= read -r dmg; do
            [ -n "$dmg" ] || continue
            dmgs_found=$((dmgs_found + 1))

            echo "Submitting $dmg for notarization"
            xcrun notarytool submit "$dmg" "${notary_args[@]}"

            xcrun stapler staple "$dmg"
            xcrun stapler validate "$dmg"
          done < <(find src-tauri/target -path "*/release/bundle/dmg/*.dmg" -type f)

          if [ "$dmgs_found" -eq 0 ]; then
            echo "No macOS DMG found to notarize." >&2
            exit 1
          fi

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          echo "=== All bundle files ==="
          find src-tauri/target -path "*/release/bundle/*" -type f \( \
            -name "*.dmg" -o -name "*.app.tar.gz" -o -name "*.app.tar.gz.sig" \
            -o -name "*.deb" -o -name "*.rpm" \
            -o -name "*.AppImage" -o -name "*.AppImage.tar.gz" -o -name "*.AppImage.tar.gz.sig" \
            -o -name "*.exe" -o -name "*.msi" \
            -o -name "*.nsis.zip" -o -name "*.nsis.zip.sig" \
          \) | while read f; do
            echo "  $(basename "$f")"
            cp "$f" artifacts/
          done
          echo "=== Collected ==="
          ls -la artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.artifact_name }}
          path: artifacts/*

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: build-*
          path: dist

      - name: List all artifacts
        run: find dist -type f | sort

      - name: Create release and generate latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          BASE_URL="https://github.com/${GH_REPO}/releases/download/${TAG}"

          echo "Creating release ${TAG}"
          gh release create "$TAG" \
            --repo "$GH_REPO" \
            --title "SkillReg v${VERSION}" \
            --notes "See the assets below for download links." \
            --draft

          # Upload all release assets (exclude .sig files and updater archives)
          echo "=== Uploading release assets ==="
          find dist -type f \( -name "*.dmg" -o -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" -o -name "*.exe" -o -name "*.msi" \) | while read f; do
            NAME=$(basename "$f")
            echo "  Uploading $NAME"
            gh release upload "$TAG" "$f" --repo "$GH_REPO" --clobber
          done

          # Upload updater archives (.app.tar.gz, .AppImage.tar.gz, .nsis.zip)
          echo "=== Uploading updater archives ==="

          # macOS aarch64 - rename to include arch
          MACOS_ARM=$(find dist/build-darwin-aarch64 -name "*.app.tar.gz" ! -name "*.sig" 2>/dev/null | head -1)
          if [ -n "$MACOS_ARM" ]; then
            cp "$MACOS_ARM" "SkillReg_aarch64.app.tar.gz"
            gh release upload "$TAG" "SkillReg_aarch64.app.tar.gz" --repo "$GH_REPO" --clobber
            echo "  Uploaded SkillReg_aarch64.app.tar.gz"
          fi

          # macOS x86_64 - rename to include arch
          MACOS_X64=$(find dist/build-darwin-x86_64 -name "*.app.tar.gz" ! -name "*.sig" 2>/dev/null | head -1)
          if [ -n "$MACOS_X64" ]; then
            cp "$MACOS_X64" "SkillReg_x64.app.tar.gz"
            gh release upload "$TAG" "SkillReg_x64.app.tar.gz" --repo "$GH_REPO" --clobber
            echo "  Uploaded SkillReg_x64.app.tar.gz"
          fi

          # Linux AppImage.tar.gz
          LINUX_TAR=$(find dist/build-linux-x86_64 -name "*.AppImage.tar.gz" ! -name "*.sig" 2>/dev/null | head -1)
          if [ -n "$LINUX_TAR" ]; then
            gh release upload "$TAG" "$LINUX_TAR" --repo "$GH_REPO" --clobber
            echo "  Uploaded $(basename "$LINUX_TAR")"
          fi

          # Windows nsis.zip
          WIN_ZIP=$(find dist/build-windows-x86_64 -name "*.nsis.zip" ! -name "*.sig" 2>/dev/null | head -1)
          if [ -n "$WIN_ZIP" ]; then
            gh release upload "$TAG" "$WIN_ZIP" --repo "$GH_REPO" --clobber
            echo "  Uploaded $(basename "$WIN_ZIP")"
          fi

          # === Generate latest.json ===
          echo "=== Generating latest.json ==="
          PLATFORMS="{}"

          # macOS aarch64
          SIG=$(find dist/build-darwin-aarch64 -name "*.app.tar.gz.sig" 2>/dev/null | head -1)
          if [ -n "$SIG" ]; then
            PLATFORMS=$(echo "$PLATFORMS" | jq --arg s "$(cat "$SIG")" --arg u "${BASE_URL}/SkillReg_aarch64.app.tar.gz" \
              '. + {"darwin-aarch64": {"signature": $s, "url": $u}}')
            echo "  darwin-aarch64 OK"
          fi

          # macOS x86_64
          SIG=$(find dist/build-darwin-x86_64 -name "*.app.tar.gz.sig" 2>/dev/null | head -1)
          if [ -n "$SIG" ]; then
            PLATFORMS=$(echo "$PLATFORMS" | jq --arg s "$(cat "$SIG")" --arg u "${BASE_URL}/SkillReg_x64.app.tar.gz" \
              '. + {"darwin-x86_64": {"signature": $s, "url": $u}}')
            echo "  darwin-x86_64 OK"
          fi

          # Linux
          SIG=$(find dist/build-linux-x86_64 -name "*.AppImage.tar.gz.sig" 2>/dev/null | head -1)
          if [ -n "$SIG" ] && [ -n "$LINUX_TAR" ]; then
            PLATFORMS=$(echo "$PLATFORMS" | jq --arg s "$(cat "$SIG")" --arg u "${BASE_URL}/$(basename "$LINUX_TAR")" \
              '. + {"linux-x86_64": {"signature": $s, "url": $u}}')
            echo "  linux-x86_64 OK"
          fi

          # Windows
          SIG=$(find dist/build-windows-x86_64 -name "*.nsis.zip.sig" 2>/dev/null | head -1)
          if [ -n "$SIG" ] && [ -n "$WIN_ZIP" ]; then
            PLATFORMS=$(echo "$PLATFORMS" | jq --arg s "$(cat "$SIG")" --arg u "${BASE_URL}/$(basename "$WIN_ZIP")" \
              '. + {"windows-x86_64": {"signature": $s, "url": $u}}')
            echo "  windows-x86_64 OK"
          fi

          jq -n \
            --arg v "$VERSION" \
            --arg n "SkillReg v$VERSION" \
            --arg d "$PUB_DATE" \
            --argjson p "$PLATFORMS" \
            '{version: $v, notes: $n, pub_date: $d, platforms: $p}' > latest.json

          echo "=== latest.json ==="
          cat latest.json

          gh release upload "$TAG" latest.json --repo "$GH_REPO" --clobber
          echo "latest.json uploaded to ${TAG}"
